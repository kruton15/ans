<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>M11-1</title>

<style>
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:#f2f5fb;
  text-align:center;
}
h3{margin:12px;color:#333}

#scanner{
  width:220px;height:220px;
  margin:10px auto;
  border-radius:18px;
  overflow:hidden;
  border:4px solid #5b7cfa;
  box-shadow:0 8px 18px rgba(0,0,0,.15);
}
video{width:100%;height:100%;object-fit:cover}

#status{
  font-size:14px;
  color:#5b7cfa;
  margin:6px 0;
}

#out{
  max-width:360px;
  margin:12px auto;
  background:#fff;
  border-radius:16px;
  padding:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
  text-align:left;
  font-size:15px;
  line-height:1.65;
}

.badge{
  display:inline-block;
  background:#5b7cfa;
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  font-size:13px;
  margin-bottom:8px;
}
.error{color:#d33}
</style>
</head>

<body>
<h3>📷 สแกนบาร์โค้ด</h3>

<div id="scanner">
  <video id="v" autoplay playsinline></video>
</div>

<div id="status">🔍 กำลังสแกน…</div>
<div id="out"></div>

<script>
const v=document.getElementById("v"),
      out=document.getElementById("out"),
      status=document.getElementById("status");

let last="";

if(!("BarcodeDetector" in window)){
  status.innerHTML="❌ อุปกรณ์นี้ไม่รองรับการสแกน";
  throw "";
}

(async()=>{
  let stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  v.srcObject=stream;

  let detector=new BarcodeDetector();
  setInterval(async()=>{
    let b=await detector.detect(v);
    if(b.length){
      let val=b[0].rawValue;
      if(val!==last){
        last=val;
        calc(val);
      }
    }
  },700);
})();

function calc(x){
  if(!/^\d+-\d+-\d+$/.test(x)){
    status.innerHTML="❌ รูปแบบข้อมูลไม่ถูกต้อง";
    out.innerHTML="";
    return;
  }

  let [A,B,C]=x.split("-").map(Number),
      D=2*A+B,
      R=D/2,
      big=Math.PI*R*R,
      small=Math.PI*(B/2)**2,
      runC=big-small,
      runR=A*C*2,
      total=runC+runR;

  status.innerHTML="✅ สแกนสำเร็จ";

  out.innerHTML=`
  <div class="badge">A=${A} B=${B} C=${C}</div><br>
  1) เส้นผ่านศูนย์กลางวงกลมใหญ่ = ${D} ม.<br>
  2) รัศมีวงกลมใหญ่ = ${R} ม.<br>
  3) พื้นที่วงกลมใหญ่ = ${big.toFixed(2)} ตร.ม.<br>
  4) พื้นที่วงกลมเล็ก = ${small.toFixed(2)} ตร.ม.<br>
  5) ลู่วิ่งวงกลม = ${runC.toFixed(2)} ตร.ม.<br>
  6) ลู่วิ่งสี่เหลี่ยม = ${runR.toFixed(2)} ตร.ม.<br>
  7) พื้นที่ลู่วิ่ง = ${total.toFixed(2)} ตร.ม.
  `;
}
</script>
</body>
</html>
