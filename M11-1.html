<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scan & Calculate</title>

<style>
body{
  margin:0;
  font-family: "Segoe UI",sans-serif;
  background:#f5f7fb;
  text-align:center;
}
h3{margin:12px;color:#444}

#scanner{
  width:220px;
  height:220px;
  margin:10px auto;
  border-radius:20px;
  overflow:hidden;
  border:4px solid #6c8cff;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

#out{
  max-width:360px;
  margin:12px auto;
  background:#fff;
  border-radius:16px;
  padding:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
  text-align:left;
  font-size:15px;
  line-height:1.6;
}

.badge{
  display:inline-block;
  background:#6c8cff;
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  font-size:13px;
  margin-bottom:8px;
}
</style>
</head>

<body>
<h3>📷 สแกนบาร์โค้ด</h3>

<div id="scanner">
  <video id="v" autoplay playsinline></video>
</div>

<div id="out">กำลังรอสแกน…</div>

<script>
let v=document.getElementById("v"), out=document.getElementById("out");

(async()=>{
  let s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  v.srcObject=s;
  let d=new BarcodeDetector();
  setInterval(async()=>{
    let b=await d.detect(v);
    if(b.length) calc(b[0].rawValue);
  },600);
})();

function calc(x){
  let [A,B,C]=x.split("-").map(Number),
      D=2*A+B,
      R=D/2,
      big=3.14*R*R,
      small=3.14*(B/2)**2,
      runC=big-small,
      runR=A*C*2,
      total=runC+runR;

  out.innerHTML=`
  <div class="badge">A=${A} B=${B} C=${C}</div><br>
  1) เส้นผ่านศูนย์กลางวงกลมใหญ่ = ${D} ม.<br>
  2) รัศมีวงกลมใหญ่ = ${R} ม.<br>
  3) พื้นที่วงกลมใหญ่ = ${big.toFixed(2)} ตร.ม.<br>
  4) พื้นที่วงกลมเล็ก = ${small.toFixed(2)} ตร.ม.<br>
  5) ลู่วิ่งวงกลม = ${runC.toFixed(2)} ตร.ม.<br>
  6) ลู่วิ่งสี่เหลี่ยม = ${runR.toFixed(2)} ตร.ม.<br>
  7) พื้นที่ลู่วิ่ง = ${total.toFixed(2)} ตร.ม.
  `;
}
</script>
</body>
</html>
